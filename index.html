<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Resplan</title>
<style>
  :root {
    color-scheme: light;
  }
  * {
    box-sizing: border-box;
  }
  html, body {
    height: 100%;
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    background: #faf6ee;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(139, 115, 85, 0.06), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(139, 115, 85, 0.06), transparent 45%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: #3b322a;
    -webkit-text-size-adjust: 100%;
  }
  .card {
    width: 100%;
    max-width: 360px;
    background: #fffdf8;
    border: 1px solid #e5d8bd;
    border-radius: 14px;
    padding: 2.5rem 2rem 2rem;
    box-shadow: 0 12px 32px rgba(74, 59, 42, 0.10);
    text-align: center;
  }
  h1 {
    margin: 0 0 0.5rem;
    font-family: Georgia, "Times New Roman", Times, serif;
    font-size: 1.7rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: #4a3b2a;
  }
  .lead {
    margin: 0 0 1.75rem;
    font-size: 0.95rem;
    line-height: 1.5;
    color: #766451;
  }
  form {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  input[type="password"] {
    width: 100%;
    padding: 0.85rem 1rem;
    border: 1px solid #d9c9a8;
    border-radius: 9px;
    background: #fffefb;
    font-size: 1.15rem;
    text-align: center;
    letter-spacing: 0.35em;
    color: #3b322a;
    outline: none;
  }
  input[type="password"]::placeholder {
    /* The 0.35em tracking above is meant to space out the typed digits; on the
       "Kod" placeholder it renders as "K o d". Reset tracking for the placeholder. */
    letter-spacing: normal;
  }
  input[type="password"]:focus {
    border-color: #a98a55;
    box-shadow: 0 0 0 3px rgba(169, 138, 85, 0.15);
  }
  button {
    padding: 0.85rem 1rem;
    border: none;
    border-radius: 9px;
    background: #8a6d46;
    color: #fff9ef;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button:hover {
    background: #745a39;
  }
  button:disabled {
    opacity: 0.6;
    cursor: default;
  }
  .status {
    min-height: 1.3em;
    margin: 1rem 0 0;
    font-size: 0.85rem;
    color: #8a7a63;
  }
  .status.error {
    color: #a3402f;
  }
</style>
</head>
<body>
<main class="card">
  <h1>Resplan</h1>

  <form id="codeForm" autocomplete="off">

    <button type="submit">Öppna</button>
  </form>

</main>

var STORAGE_KEY = 'resplan2026jp-key';

function b64ToBuf(b64) {
  var binary = atob(b64);
  var len = binary.length;
  var bytes = new Uint8Array(len);
  for (var i = 0; i < len; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  return bytes;
}

function bufToB64(buf) {
  var bytes = buf instanceof Uint8Array ? buf : new Uint8Array(buf);
  var binary = '';
  var chunkSize = 0x8000;
  for (var i = 0; i < bytes.length; i += chunkSize) {
    var chunk = bytes.subarray(i, i + chunkSize);
    binary += String.fromCharCode.apply(null, chunk);
  }
  return btoa(binary);
}

async function deriveKeyFromCode(payload, code) {
  var enc = new TextEncoder();
  var baseKey = await crypto.subtle.importKey(
    'raw',
    enc.encode(code),
    { name: 'PBKDF2' },
    false,
    ['deriveBits']
  );
  var saltBuf = b64ToBuf(payload.salt);
  var bits = await crypto.subtle.deriveBits(
    {
      name: 'PBKDF2',
      salt: saltBuf,
      iterations: payload.iterations,
      hash: 'SHA-256'
    },
    baseKey,
    256
  );
  return new Uint8Array(bits);
}

async function decryptPayload(payload, rawKeyBytes) {
  var key = await crypto.subtle.importKey(
    'raw',
    rawKeyBytes,
    { name: 'AES-GCM' },
    false,
    ['decrypt']
  );
  var ivBuf = b64ToBuf(payload.iv);
  var dataBuf = b64ToBuf(payload.data);
  var plainBuf = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: ivBuf },
    key,
    dataBuf
  );
  return new TextDecoder('utf-8').decode(plainBuf);
}


function renderHtml(html) {
  // Defer to a macrotask (setTimeout 0) rather than writing directly from a
  // microtask continuation. If document.write() runs while the parser /
  // initial script is still considered "active" (which can happen when the
  // auto-unlock promise chain resolves fast, right on the heels of the
  // initial synchronous script execution), Chrome treats it as an insertion
  // into the still-open document instead of a full document.open() reset,
  // and the new HTML gets appended after the gate markup instead of
  // replacing it. A setTimeout(0) guarantees the parser/task queue has
  // settled first, so document.open() always does a clean full reset.
  setTimeout(function () {
    document.open();
    document.write(html);
    document.close();
  }, 0);
}

function setStatus(msg, isError) {
  var el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = isError ? 'status error' : 'status';
}

function setDisabled(disabled) {
  document.getElementById('codeInput').disabled = disabled;
  document.getElementById('codeForm').querySelector('button').disabled = disabled;
}

function showError() {
  setStatus('Fel kod — försök igen', true);
  var input = document.getElementById('codeInput');
  input.value = '';
  input.focus();
}

async function attemptUnlock(code) {
  setDisabled(true);
  setStatus('Låser upp…', false);
  try {
    var rawKey = await deriveKeyFromCode(PAYLOAD, code);
    var html = await decryptPayload(PAYLOAD, rawKey);
    try {
      localStorage.setItem(STORAGE_KEY, bufToB64(rawKey));
    } catch (e) {}
    renderHtml(html);
  } catch (err) {
    setDisabled(false);
    showError();
  }
}

document.getElementById('codeForm').addEventListener('submit', function (ev) {
  ev.preventDefault();
  var input = document.getElementById('codeInput');
  var code = input.value;
  if (!code) return;
  attemptUnlock(code);
});

(async function tryAutoUnlock() {
  var stored;
  try {
    stored = localStorage.getItem(STORAGE_KEY);
  } catch (e) {
    stored = null;
  }
  if (!stored) return;
  try {
    var rawKey = b64ToBuf(stored);
    var html = await decryptPayload(PAYLOAD, rawKey);
    renderHtml(html);
  } catch (e) {
    try {
      localStorage.removeItem(STORAGE_KEY);
    } catch (e2) {}
  }
})();
</script>
